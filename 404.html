<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex,follow"/>
<title>Seite nicht gefunden – Adam Nümm</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{ --ink:#1a1814; --cream:#f5f0e8; --warm:#c8a96e; --muted:rgba(245,240,232,.55); }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--ink);color:var(--cream);font-family:'DM Sans',-apple-system,Segoe UI,Roboto,sans-serif;
       display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;line-height:1.6;}
  .wrap{max-width:520px;}
  .label{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--warm);margin-bottom:18px;}
  h1{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(40px,9vw,68px);line-height:1;margin-bottom:18px;}
  h1 em{font-style:italic;color:var(--warm);}
  p{color:var(--muted);font-size:16px;margin-bottom:30px;}
  a.btn{display:inline-block;font-size:14px;letter-spacing:.06em;text-decoration:none;color:var(--ink);
        background:var(--warm);padding:13px 28px;border-radius:8px;transition:filter .2s;}
  a.btn:hover{filter:brightness(1.08);}
  .sub{margin-top:22px;font-size:13px;color:var(--muted);}
  .sub a{color:var(--cream);text-decoration:none;border-bottom:1px solid rgba(200,169,110,.4);}
  .sub a:hover{color:var(--warm);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">Fehler 404</div>
    <h1>Seite <em>nicht gefunden</em></h1>
    <p>Diese Seite stammt vermutlich aus einer früheren Version der Website und gibt es nicht mehr. Aber die Bühne ist offen –&nbsp;komm zurück zur Startseite.</p>
    <a class="btn" href="/">Zur Startseite</a>
    <div class="sub">Adam Nümm · Schauspieler &amp; Synchronsprecher · <a href="/#kontakt">Kontakt</a></div>
  </div>
</body>
</html>
